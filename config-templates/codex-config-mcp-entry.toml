# Add this section to ~/.codex/config.toml

[mcp_servers.llmmsg-channel]
command = "node"
args = ["/opt/llmmsg/llmmsg-channel/channel.mjs"]
cwd = "/opt/llmmsg"
required = true
startup_timeout_sec = 20
enabled_tools = [
  "register",
  "send",
  "roster",
  "online",
  "thread",
  "search",
  "log",
  "aro_list",
  "aro_join",
  "aro_leave",
  "unregister",
  "guide",
  "has_unread",
  "read_unread",
]

[mcp_servers.llmmsg-channel.env]
LLMMSG_AGENT = ""
LLMMSG_HUB_PORT = "9701"
